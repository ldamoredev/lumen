<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .half { padding: 22px 20px; font-family: Inter, sans-serif; }
  .stack { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .label { font-size: 11px; font-weight: 500; opacity: 0.7; margin-bottom: 4px; }
  .input {
    width: 100%; padding: 13px 14px; border-radius: 12px;
    font-size: 14px; font-family: Inter, sans-serif; outline: none;
  }
  .input-l { background: #FDFBF7; color: #1A1826; border: 1px solid rgba(26,24,38,0.10); }
  .input-l:focus { border-color: #7B7DE8; box-shadow: 0 0 0 4px rgba(123,125,232,0.12); }
  .input-d { background: #1E2230; color: #ECEAF5; border: 1px solid rgba(255,255,255,0.08); }
  .input-d:focus { border-color: #9FA2FF; box-shadow: 0 0 0 4px rgba(159,162,255,0.16); }
  .textarea { min-height: 64px; font-family: Fraunces, serif; font-size: 15px; line-height: 22px; font-variation-settings: 'opsz' 24; resize: none; }
  ::placeholder { color: #8A8799; }
  .input-d::placeholder { color: #6E6B85; }
</style>
</head><body>
<div class="card-split">
  <div class="half light">
    <div class="mode-tag">Inputs · Light</div>
    <div class="stack">
      <div><div class="label">Title</div><input class="input input-l" placeholder="Untitled" value="A quiet Thursday"></div>
      <div><div class="label">What happened?</div><textarea class="input input-l textarea" placeholder="Start writing…"></textarea></div>
    </div>
  </div>
  <div class="half dark">
    <div class="mode-tag">Inputs · Dark</div>
    <div class="stack">
      <div><div class="label" style="color:#A8A5BE">Title</div><input class="input input-d" placeholder="Untitled" value="A quiet Thursday"></div>
      <div><div class="label" style="color:#A8A5BE">What happened?</div><textarea class="input input-d textarea" placeholder="Start writing…"></textarea></div>
    </div>
  </div>
</div>
</body></html>

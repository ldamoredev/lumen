<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; align-items: center; gap: 12px; font-size: 12px; }
  .chip {
    width: 48px; height: 48px; border-radius: 10px; flex: 0 0 48px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
  }
  .half.dark .chip { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08); }
  .label { font-weight: 600; font-size: 12px; }
  .hex { font-family: ui-monospace, Menlo, monospace; font-size: 11px; opacity: 0.6; }
</style>
</head><body style="background:#ECE7DF;">
<div class="card-split">
  <div class="half light">
    <div class="mode-tag">Light · Surfaces</div>
    <div class="row">
      <div class="swatch"><div class="chip" style="background:#F4F0EA"></div><div><div class="label">bg-0</div><div class="hex">#F4F0EA · page</div></div></div>
      <div class="swatch"><div class="chip" style="background:#F9F6F1"></div><div><div class="label">bg-1</div><div class="hex">#F9F6F1 · raised</div></div></div>
      <div class="swatch"><div class="chip" style="background:#FDFBF7"></div><div><div class="label">bg-2</div><div class="hex">#FDFBF7 · input</div></div></div>
      <div class="swatch"><div class="chip" style="background:#EFEAF5"></div><div><div class="label">bg-tint</div><div class="hex">#EFEAF5 · periwinkle tint</div></div></div>
    </div>
  </div>
  <div class="half dark">
    <div class="mode-tag">Dark · Surfaces</div>
    <div class="row">
      <div class="swatch"><div class="chip" style="background:#0B0D14"></div><div><div class="label">bg-0</div><div class="hex">#0B0D14 · page</div></div></div>
      <div class="swatch"><div class="chip" style="background:#171A26"></div><div><div class="label">bg-1</div><div class="hex">#171A26 · raised</div></div></div>
      <div class="swatch"><div class="chip" style="background:#1E2230"></div><div><div class="label">bg-2</div><div class="hex">#1E2230 · input</div></div></div>
      <div class="swatch"><div class="chip" style="background:#1A1D2E"></div><div><div class="label">bg-tint</div><div class="hex">#1A1D2E · aurora tint</div></div></div>
    </div>
  </div>
</div>
</body></html>

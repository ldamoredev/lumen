<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .half { padding: 22px 20px; font-family: Inter, sans-serif; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px 8px 10px; border-radius: 999px;
    font-size: 13px; font-weight: 500;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4); }
  .chip-l { background: rgba(255,255,255,0.7); color: #1A1826; border: 1px solid rgba(26,24,38,0.06); box-shadow: 0 2px 8px rgba(40,30,80,0.05); }
  .chip-l.active { background: #1A1826; color: #FDFBF7; border-color: transparent; }
  .chip-d { background: rgba(30,34,48,0.7); color: #ECEAF5; border: 1px solid rgba(255,255,255,0.08); }
  .chip-d.active { background: #ECEAF5; color: #0E1016; border-color: transparent; }
  .tag { font-size: 12px; font-weight: 500; padding: 5px 10px; border-radius: 6px; }
  .tag-l { background: rgba(123,125,232,0.12); color: #5A5CC7; }
  .tag-d { background: rgba(159,162,255,0.16); color: #C7C9FF; }
</style>
</head><body>
<div class="card-split">
  <div class="half light">
    <div class="mode-tag">Mood chips · Light</div>
    <div class="row">
      <div class="chip chip-l"><div class="dot" style="background:linear-gradient(145deg,#A8C5E8,#C9DDF0)"></div>calm</div>
      <div class="chip chip-l active"><div class="dot" style="background:linear-gradient(145deg,#E8B5C8,#F2D0DC)"></div>tender</div>
      <div class="chip chip-l"><div class="dot" style="background:linear-gradient(145deg,#A8D1B5,#C9E2D1)"></div>grateful</div>
    </div>
    <div style="margin-top:14px;"></div>
    <div class="row">
      <span class="tag tag-l">morning</span>
      <span class="tag tag-l">walk</span>
      <span class="tag tag-l">reading</span>
      <span class="tag tag-l">+ add tag</span>
    </div>
  </div>
  <div class="half dark">
    <div class="mode-tag">Mood chips · Dark</div>
    <div class="row">
      <div class="chip chip-d"><div class="dot" style="background:linear-gradient(145deg,#5A8BC4,#7BA7D9)"></div>calm</div>
      <div class="chip chip-d active"><div class="dot" style="background:linear-gradient(145deg,#C98AA8,#D9A8BF)"></div>tender</div>
      <div class="chip chip-d"><div class="dot" style="background:linear-gradient(145deg,#7DB591,#9CCAAE)"></div>grateful</div>
    </div>
    <div style="margin-top:14px;"></div>
    <div class="row">
      <span class="tag tag-d">morning</span>
      <span class="tag tag-d">walk</span>
      <span class="tag tag-d">reading</span>
      <span class="tag tag-d">+ add tag</span>
    </div>
  </div>
</div>
</body></html>

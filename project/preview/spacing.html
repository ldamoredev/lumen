<!doctype html>
<html><head><meta charset="utf-8">
<style>
  html, body { margin: 0; }
  body {
    background: #F7F4EF; color: #1A1826;
    padding: 28px 32px;
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
  }
  .eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #8A8799; margin-bottom: 14px; }
  .row { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  .token { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: #8A8799; width: 70px; flex: 0 0 70px; }
  .bar { height: 10px; background: linear-gradient(90deg, #B9BAF1, #7B7DE8); border-radius: 3px; }
  .val { font-size: 11px; color: #55526B; font-family: ui-monospace, Menlo, monospace; }
</style>
</head><body>
<div class="eyebrow">Spacing · 4px base grid</div>
<div class="row"><div class="token">sp-1</div><div class="bar" style="width:4px"></div><div class="val">4px</div></div>
<div class="row"><div class="token">sp-2</div><div class="bar" style="width:8px"></div><div class="val">8px</div></div>
<div class="row"><div class="token">sp-3</div><div class="bar" style="width:12px"></div><div class="val">12px</div></div>
<div class="row"><div class="token">sp-4</div><div class="bar" style="width:16px"></div><div class="val">16px</div></div>
<div class="row"><div class="token">sp-5</div><div class="bar" style="width:20px"></div><div class="val">20px · screen pad</div></div>
<div class="row"><div class="token">sp-6</div><div class="bar" style="width:24px"></div><div class="val">24px</div></div>
<div class="row"><div class="token">sp-8</div><div class="bar" style="width:32px"></div><div class="val">32px · section</div></div>
<div class="row"><div class="token">sp-10</div><div class="bar" style="width:40px"></div><div class="val">40px</div></div>
<div class="row"><div class="token">sp-14</div><div class="bar" style="width:56px"></div><div class="val">56px</div></div>
<div class="row"><div class="token">sp-18</div><div class="bar" style="width:72px"></div><div class="val">72px · hero top</div></div>
</body></html>

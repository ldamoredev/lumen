<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .half { padding: 28px 24px; }
  .grid { display: flex; gap: 18px; margin-top: 6px; }
  .card { width: 88px; height: 88px; border-radius: 16px; display: flex; align-items: flex-end; justify-content: center; padding: 10px; font-size: 10px; font-family: ui-monospace, Menlo, monospace; }
  .light .card { background: white; color: #55526B; }
  .dark  .card { background: #1E2230; color: #A8A5BE; }
  .sm-l { box-shadow: 0 2px 8px rgba(40,30,80,0.06); }
  .md-l { box-shadow: 0 8px 24px rgba(40,30,80,0.10); }
  .lg-l { box-shadow: 0 20px 60px rgba(40,30,80,0.16); }
  .sm-d { box-shadow: 0 2px 8px rgba(0,0,0,0.35); }
  .md-d { box-shadow: 0 8px 24px rgba(0,0,0,0.40); }
  .lg-d { box-shadow: 0 20px 60px rgba(0,0,0,0.55); }
</style>
</head><body>
<div class="card-split">
  <div class="half light">
    <div class="mode-tag">Shadows · Light</div>
    <div class="grid">
      <div class="card sm-l">sm</div>
      <div class="card md-l">md</div>
      <div class="card lg-l">lg</div>
    </div>
  </div>
  <div class="half dark">
    <div class="mode-tag">Shadows · Dark</div>
    <div class="grid">
      <div class="card sm-d">sm</div>
      <div class="card md-d">md</div>
      <div class="card lg-d">lg</div>
    </div>
  </div>
</div>
</body></html>

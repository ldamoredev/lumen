<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<style>
  .half { padding: 24px 22px; font-family: Inter, sans-serif; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px 8px; margin-top: 8px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .ic span { font-size: 9px; opacity: 0.55; font-family: ui-monospace, Menlo, monospace; }
  .light .ic i { color: #1A1826; }
  .dark  .ic i { color: #ECEAF5; }
</style>
</head><body>
<div class="card-split">
  <div class="half light">
    <div class="mode-tag">Lucide · 1.5px · Light</div>
    <div class="grid">
      <div class="ic"><i data-lucide="home"></i><span>home</span></div>
      <div class="ic"><i data-lucide="calendar-days"></i><span>timeline</span></div>
      <div class="ic"><i data-lucide="pen-line"></i><span>write</span></div>
      <div class="ic"><i data-lucide="sparkles"></i><span>insights</span></div>
      <div class="ic"><i data-lucide="user-round"></i><span>profile</span></div>
      <div class="ic"><i data-lucide="heart"></i><span>mood</span></div>
      <div class="ic"><i data-lucide="lock"></i><span>lock</span></div>
      <div class="ic"><i data-lucide="search"></i><span>search</span></div>
      <div class="ic"><i data-lucide="quote"></i><span>prompt</span></div>
      <div class="ic"><i data-lucide="cloud-sun"></i><span>weather</span></div>
      <div class="ic"><i data-lucide="paperclip"></i><span>attach</span></div>
      <div class="ic"><i data-lucide="mic"></i><span>voice</span></div>
    </div>
  </div>
  <div class="half dark">
    <div class="mode-tag">Lucide · 1.5px · Dark</div>
    <div class="grid">
      <div class="ic"><i data-lucide="home"></i><span>home</span></div>
      <div class="ic"><i data-lucide="calendar-days"></i><span>timeline</span></div>
      <div class="ic"><i data-lucide="pen-line"></i><span>write</span></div>
      <div class="ic"><i data-lucide="sparkles"></i><span>insights</span></div>
      <div class="ic"><i data-lucide="user-round"></i><span>profile</span></div>
      <div class="ic"><i data-lucide="heart"></i><span>mood</span></div>
      <div class="ic"><i data-lucide="lock"></i><span>lock</span></div>
      <div class="ic"><i data-lucide="search"></i><span>search</span></div>
      <div class="ic"><i data-lucide="quote"></i><span>prompt</span></div>
      <div class="ic"><i data-lucide="cloud-sun"></i><span>weather</span></div>
      <div class="ic"><i data-lucide="paperclip"></i><span>attach</span></div>
      <div class="ic"><i data-lucide="mic"></i><span>voice</span></div>
    </div>
  </div>
</div>
<script>lucide.createIcons({ attrs: { 'stroke-width': 1.5 } });</script>
</body></html>

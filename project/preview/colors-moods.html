<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px 10px; }
  .mood { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .dot { width: 52px; height: 52px; border-radius: 999px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 4px 16px rgba(40,30,80,0.10);
  }
  .name { font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
  .sub { font-size: 10px; opacity: 0.55; font-family: ui-monospace, Menlo, monospace; }
</style>
</head><body>
<div class="card-split">
  <div class="half light">
    <div class="mode-tag">Moods · Light</div>
    <div class="grid">
      <div class="mood"><div class="dot" style="background:linear-gradient(145deg,#A8C5E8,#C9DDF0)"></div><div class="name">calm</div></div>
      <div class="mood"><div class="dot" style="background:linear-gradient(145deg,#E8B5C8,#F2D0DC)"></div><div class="name">tender</div></div>
      <div class="mood"><div class="dot" style="background:linear-gradient(145deg,#6B6F8C,#9598B0)"></div><div class="name">heavy</div></div>
      <div class="mood"><div class="dot" style="background:linear-gradient(145deg,#E8C97B,#F3DDA3)"></div><div class="name">bright</div></div>
      <div class="mood"><div class="dot" style="background:linear-gradient(145deg,#D89A8C,#E8B8AB)"></div><div class="name">restless</div></div>
      <div class="mood"><div class="dot" style="background:linear-gradient(145deg,#A8D1B5,#C9E2D1)"></div><div class="name">grateful</div></div>
    </div>
  </div>
  <div class="half dark">
    <div class="mode-tag">Moods · Dark</div>
    <div class="grid">
      <div class="mood"><div class="dot" style="background:linear-gradient(145deg,#5A8BC4,#7BA7D9)"></div><div class="name">calm</div></div>
      <div class="mood"><div class="dot" style="background:linear-gradient(145deg,#C98AA8,#D9A8BF)"></div><div class="name">tender</div></div>
      <div class="mood"><div class="dot" style="background:linear-gradient(145deg,#4A4E6B,#6B6F8C)"></div><div class="name">heavy</div></div>
      <div class="mood"><div class="dot" style="background:linear-gradient(145deg,#C9A85C,#D9BF7C)"></div><div class="name">bright</div></div>
      <div class="mood"><div class="dot" style="background:linear-gradient(145deg,#B87D6E,#C99A8B)"></div><div class="name">restless</div></div>
      <div class="mood"><div class="dot" style="background:linear-gradient(145deg,#7DB591,#9CCAAE)"></div><div class="name">grateful</div></div>
    </div>
  </div>
</div>
</body></html>
